<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2f7bc0"/>
      <stop offset="50%" stop-color="#6dafdd"/>
      <stop offset="100%" stop-color="#cee2ef"/>
    </linearGradient>
    <filter id="cloudBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#05321a" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#sky)"/>

  <g fill="#ffffff" filter="url(#cloudBlur)">
    <ellipse cx="350" cy="200" rx="520" ry="34" opacity="0.65"/>
    <ellipse cx="1150" cy="300" rx="620" ry="38" opacity="0.55"/>
    <ellipse cx="700" cy="740" rx="560" ry="34" opacity="0.45"/>
  </g>

  <g transform="translate(800 430)" filter="url(#logoShadow)">
    <g fill="#063a19">
      <rect x="-168" y="-88" width="10" height="10"/>
      <rect x="-186" y="-72" width="10" height="10"/>
      <rect x="-208" y="-52" width="10" height="10"/>
      <rect x="-234" y="-28" width="10" height="10"/>
      <rect x="-158" y="-46" width="10" height="10"/>
      <rect x="-178" y="-24" width="10" height="10"/>
      <rect x="-200" y="-2" width="10" height="10"/>
      <rect x="-226" y="24" width="10" height="10"/>
      <rect x="-256" y="50" width="10" height="10"/>
      <rect x="-150" y="0" width="10" height="10"/>
      <rect x="-170" y="24" width="10" height="10"/>
      <rect x="-192" y="50" width="10" height="10"/>
      <rect x="-218" y="76" width="10" height="10"/>
      <rect x="-144" y="48" width="10" height="10"/>
      <rect x="-162" y="72" width="10" height="10"/>
      <rect x="-184" y="98" width="10" height="10"/>
      <rect x="-210" y="124" width="10" height="10"/>
      <rect x="-138" y="98" width="10" height="10"/>
      <rect x="-156" y="124" width="10" height="10"/>
      <rect x="-180" y="148" width="10" height="10"/>
    </g>

    <polygon points="-135,-90 0,-102 5,4 -132,12" fill="#063a19"/>
    <polygon points="0,-102 142,-110 146,-4 5,4" fill="#12773b"/>
    <polygon points="-132,12 5,4 12,114 -130,118" fill="#2ec25a"/>
    <polygon points="5,4 146,-4 150,110 12,114" fill="#99eaa8"/>

    <g transform="translate(0 178)">
      <text text-anchor="middle" font-family="Arial Black, Helvetica, sans-serif" font-weight="900" font-size="58" fill="#0a0a0a" letter-spacing="-1.5">
        <tspan font-style="italic">Hyper</tspan><tspan dx="16">98</tspan>
      </text>
    </g>
  </g>
</svg>
